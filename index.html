      { label: '🔐 Encryption',   match: /encrypt|cryptograph/i },
      { label: '🐛 Bugs',         match: /\bbug\b|\berror\b|crash|glitch|freeze|windows open/i },
      { label: '🔒 2FA & Login',  match: /2fa|two-factor|two factor|fingerprint|face unlock|locked out|login/i },
    ];

    // Only show topics with 3+ jokes
    const MIN_JOKES = 3;

    // Filter: keep Random + only topics with enough jokes
    const TOPICS = TOPIC_DEFS.filter(t =>
      t.match === null || JOKES.filter(j => t.match.test(j)).length >= MIN_JOKES
    );

    // --- State
    const reactionCounts = { hilarious: 0, meh: 0, punny: 0 };
    let lastIndex = -1;
    let activeTopic = null;

    // --- Elements
    const topicsEl = document.getElementById('topics');
    const jokePlaceholder = document.getElementById('joke-placeholder');
    const jokeText = document.getElementById('joke-text');
    const actionsEl = document.getElementById('actions');
    const copyBtn = document.getElementById('copy-btn');

    // Build topic chips
    TOPICS.forEach((topic, i) => {
      const btn = document.createElement('button');
      btn.className = 'topic-chip';
      btn.textContent = topic.label;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.topic-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTopic = topic;
        generate();
      });
      topicsEl.appendChild(btn);
    });

    function pickJoke() {
      const pool = (activeTopic && activeTopic.match)
        ? JOKES.filter(j => activeTopic.match.test(j))
        : JOKES;
      let candidate;
      let tries = 0;
      do {
        candidate = pool[Math.floor(Math.random() * pool.length)];
        tries++;
      } while (JOKES.indexOf(candidate) === lastIndex && pool.length > 1 && tries < 8);
      lastIndex = JOKES.indexOf(candidate);
      return candidate;
    }

    function showJoke(text) {
      jokePlaceholder.style.display = 'none';
      jokeText.classList.remove('visible');
      jokeText.textContent = text;
      void jokeText.offsetWidth;
      jokeText.classList.add('visible');
      actionsEl.style.display = 'flex';
      Object.keys(reactionCounts).forEach(k => reactionCounts[k] = 0);
      document.querySelectorAll('.reaction-btn').forEach(btn => {
        btn.querySelector('.reaction-count').textContent = '0';
        btn.classList.remove('active');
      });
      copyBtn.textContent = '📋 Copy';
      copyBtn.classList.remove('copied');
    }

    function generate() {
      showJoke(pickJoke());
    }

    document.querySelectorAll('.reaction-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = btn.dataset.reaction;
        reactionCounts[r]++;
        btn.querySelector('.reaction-count').textContent = reactionCounts[r];
        btn.classList.add('active');
      });
    });

    copyBtn.addEventListener('click', async () => {
      const text = jokeText.textContent;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = '✓ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch {
        copyBtn.textContent = 'Copy failed';
      }
    });
  </script>
</body>
</html>
